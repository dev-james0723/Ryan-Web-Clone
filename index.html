<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <title>Keys &amp; Shutters Portfolio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff" id="meta-theme-color">
  <meta name="description" content="Keys & Shutters — Photography Portfolio 2022-2026. Selected works from New York, MSM, portraits, landscapes, cityscapes, and wildlife.">
  <meta property="og:title" content="Keys & Shutters Portfolio">
  <meta property="og:type" content="website">
  <meta property="og:image" content="images/hero.jpg">
  <meta property="og:description" content="Photography Portfolio 2022-2026">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Montserrat ≈ Proxima Nova (title); Roboto Condensed italic ≈ proxima-nova-condensed (section quotes) -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;300&family=Roboto+Condensed:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script>
    try {
      var th = localStorage.getItem('ks-theme');
      if (th === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
        var mc = document.getElementById('meta-theme-color');
        if (mc) mc.setAttribute('content', '#121212');
      }
      var lg = localStorage.getItem('ks-lang');
      if (lg === 'zh-Hant') document.documentElement.setAttribute('lang', 'zh-Hant');
    } catch (e) {}
  </script>
</head>
<body>

  <!-- Hero Section -->
  <section class="hero" id="hero">
    <div class="hero-bg">
      <img src="images/hero.jpg" alt="Keys & Shutters hero" fetchpriority="high">
    </div>
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <h1>Keys &amp; Shutters</h1>
      <p class="subtitle" data-i18n="subtitle">portfolio 2022-2026</p>
      <div class="scroll-hint" aria-hidden="true">
        <span></span>
      </div>
    </div>
  </section>

  <!-- NY & MSM Section -->
  <section class="gallery-section gallery-section--first" id="newyork">

    <div class="section-heading fade-in">

    </div>
    <div class="photo-grid">
      <!-- Row: 2 landscape + 1 portrait -->
      <div class="grid-row trio-llp fade-in">

        <div class="photo landscape"><img loading="lazy" src="images/ny02.jpg" alt="New York 2" data-full="images/ny02.jpg"></div>
        <div class="photo portrait"><img loading="lazy" src="images/ny03.jpg" alt="New York 3" data-full="images/ny03.jpg"></div>

        <div class="photo landscape"><img loading="lazy" src="images/ny04.jpg" alt="New York 4" data-full="images/ny04.jpg"></div>
      </div>
      <!-- Row: 2 landscape -->
      <div class="grid-row duo fade-in">
        <div class="photo landscape"><img loading="lazy" src="images/ny05.jpg" alt="New York 5" data-full="images/ny05.jpg"></div>
        <div class="photo landscape"><img loading="lazy" src="images/ny06.jpg" alt="New York 6" data-full="images/ny06.jpg"></div>
      </div>
      <!-- Row: 2 landscape -->
      <div class="grid-row duo fade-in">
        <div class="photo landscape"><img loading="lazy" src="images/ny07.jpg" alt="New York 7" data-full="images/ny07.jpg"></div>
        <div class="photo landscape"><img loading="lazy" src="images/ny08.jpg" alt="New York 8" data-full="images/ny08.jpg"></div>
      </div>
      <!-- Row: single portrait -->
      <div class="grid-row single-portrait fade-in">
        <div class="photo portrait"><img loading="lazy" src="images/ny09.jpg" alt="New York 9" data-full="images/ny09.jpg"></div>
      </div>
      <!-- Row: 2 landscape -->
      <div class="grid-row duo fade-in">
        <div class="photo landscape"><img loading="lazy" src="images/ny10.jpg" alt="New York 10" data-full="images/ny10.jpg"></div>
        <div class="photo landscape"><img loading="lazy" src="images/ny11.jpg" alt="New York 11" data-full="images/ny11.jpg"></div>
      </div>
      <!-- Row: single landscape -->
      <div class="grid-row single fade-in">
        <div class="photo landscape"><img loading="lazy" src="images/ny12.jpg" alt="New York 12" data-full="images/ny12.jpg"></div>
      </div>
      <!-- Row: portrait + 2 landscape -->
      <div class="grid-row trio-pll fade-in">
        <div class="photo portrait"><img loading="lazy" src="images/ny13.jpg" alt="New York 13" data-full="images/ny13.jpg"></div>
        <div class="photo landscape"><img loading="lazy" src="images/ny14.jpg" alt="New York 14" data-full="images/ny14.jpg"></div>
        <div class="photo landscape"><img loading="lazy" src="images/ny15.jpg" alt="New York 15" data-full="images/ny15.jpg"></div>
      </div>
      <!-- Row: 2 landscape -->
      <div class="grid-row duo fade-in">
        <div class="photo landscape"><img loading="lazy" src="images/ny16.jpg" alt="New York 16" data-full="images/ny16.jpg"></div>
        <div class="photo landscape"><img loading="lazy" src="images/ny17.jpg" alt="New York 17" data-full="images/ny17.jpg"></div>
      </div>
      <!-- Row: single landscape -->
      <div class="grid-row single fade-in">
        <div class="photo landscape"><img loading="lazy" src="images/ny18.jpg" alt="New York 18" data-full="images/ny18.jpg"></div>
      </div>
    </div>
    </div>
  </section>

  <!-- Wildlife Section -->

    <div class="section-heading fade-in">

  <footer class="site-footer" id="site-footer">
    <div class="site-footer__inner">
      <div class="site-footer__brand">
        <span class="site-footer__name">Keys &amp; Shutters</span>
        <span class="site-footer__tag" data-i18n="footer_tag">Photography portfolio</span>
      </div>
      <div class="site-footer__tools">
        <div class="site-footer__field">
          <label class="site-footer__label" for="footer-section-nav" data-i18n="nav_label">Jump to section</label>
          <select id="footer-section-nav" class="site-footer__select" aria-describedby="footer-section-nav-hint">
            <option value="" data-i18n="nav_placeholder">Choose a section…</option>
            <option value="#hero" data-i18n="nav_hero">Cover</option>
            <option value="#newyork" data-i18n="nav_ny">New York &amp; MSM</option>
            <option value="#portraits" data-i18n="nav_port">Portraits</option>
            <option value="#landscapes" data-i18n="nav_land">Landscapes &amp; Cityscapes</option>
            <option value="#wildlife" data-i18n="nav_wild">Wildlife</option>
          </select>
          <span id="footer-section-nav-hint" class="visually-hidden" data-i18n="nav_hint">Opens the chosen part of this page.</span>
        </div>
        <div class="site-footer__field">
          <label class="site-footer__label" for="footer-lang" data-i18n="lang_label">Language</label>
          <select id="footer-lang" class="site-footer__select">
            <option value="en">English</option>
            <option value="zh-Hant">繁體中文</option>
          </select>
        </div>
        <button type="button" class="theme-toggle" id="theme-toggle" aria-pressed="false" title="">
          <span class="theme-toggle__icons" aria-hidden="true">
            <span class="theme-toggle__sun">☀</span>
            <span class="theme-toggle__moon">☾</span>
          </span>
          <span class="theme-toggle__label">Dark mode</span>
        </button>
      </div>
    </div>
    <p class="site-footer__copy" data-i18n="footer_copy">© 2022–2026 Keys &amp; Shutters. All images by the artist.</p>
  </footer>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Image preview">
    <button type="button" class="lightbox-close" aria-label="Close">&times;</button>
    <button type="button" class="lightbox-prev" aria-label="Previous image">&#8249;</button>
    <button type="button" class="lightbox-next" aria-label="Next image">&#8250;</button>
    <div class="lightbox-content">
      <img id="lightbox-img" src="" alt="Full size preview">
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
